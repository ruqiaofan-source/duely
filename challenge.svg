<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Duely challenge: the pick, the stake, and the banter">
<title>Duely open bet challenge card</title>
<desc>An open peer-to-peer football bet daring you to take the other side, showing the pick, the stake, and the trash talk.</desc>
<defs>
<style>.anton{font-family:'Anton','Oswald','Arial Narrow',Impact,sans-serif;}
.inter{font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;}</style>
<linearGradient id="cBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#10161F"/><stop offset="1" stop-color="#0A0E13"/></linearGradient>
<radialGradient id="cGlow" cx="0.28" cy="0.32" r="0.75"><stop offset="0" stop-color="#14E0C8" stop-opacity="0.16"/><stop offset="1" stop-color="#14E0C8" stop-opacity="0"/></radialGradient>
<linearGradient id="cTeal" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#14E0C8"/><stop offset="1" stop-color="#0FB7A4"/></linearGradient>
<linearGradient id="cDuel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#14E0C8"/><stop offset=".5" stop-color="#14E0C8"/><stop offset=".5" stop-color="#7C3AED"/><stop offset="1" stop-color="#7C3AED"/></linearGradient>
</defs>

<rect width="1200" height="630" fill="#0A0E13"/>
<rect width="1200" height="630" fill="url(#cBg)"/>
<rect width="1200" height="630" fill="url(#cGlow)"/>
<rect x="0" y="0" width="1200" height="6" fill="#14E0C8"/>

<!-- brand -->
<g transform="translate(64,48)">
<g transform="scale(0.46)"><rect width="100" height="100" rx="26" fill="#0E141C"/><path d="M26 20 H56 C73 20 80 33 80 50 C80 67 73 80 56 80 H26 Z M39 33 H55 C64 33 68 41 68 50 C68 59 64 67 55 67 H39 Z" fill-rule="evenodd" fill="url(#cDuel)"/><rect x="51" y="20" width="3" height="60" fill="#0A0E13"/></g>
<text x="60" y="28" class="anton" font-size="30" fill="#F4F7FB" letter-spacing="1">DUELY</text>
<text x="62" y="46" class="inter" font-size="12" font-weight="700" fill="#14E0C8" letter-spacing="2.5">BACK YOURSELF.</text>
</g>
<g class="inter"><rect x="1006" y="52" width="130" height="40" rx="20" fill="#06231F" stroke="#14E0C8" stroke-width="1.5"/><text x="1071" y="78" text-anchor="middle" font-size="15" font-weight="800" fill="#14E0C8" letter-spacing="2">OPEN BET</text></g>

<!-- HERO: the pick -->
<text x="66" y="184" class="inter" font-size="22" font-weight="900" fill="#14E0C8" letter-spacing="6">{{PROPOSER}} IS BACKING</text>
<text x="60" y="310" class="anton" font-size="122" fill="#14E0C8">{{BACKED}}</text>
<text x="66" y="360" class="inter" font-size="27" font-weight="700" fill="#9AA7B8">{{HOME}}  v  {{AWAY}}</text>

<rect x="64" y="400" width="1072" height="1.5" fill="#2A3340"/>

<!-- the banter (full width — the stake is a term, not the headline) -->
<text x="66" y="446" class="inter" font-size="15" font-weight="900" fill="#93A1B3" letter-spacing="3">THE SHOUT</text>
<text x="66" y="500" class="inter" font-size="34" font-weight="800" font-style="italic" fill="#F4F7FB">&#8220;{{NOTE}}&#8221;</text>
<text x="66" y="534" class="inter" font-size="16" font-weight="600" fill="#9AA7B8">&#8212; {{PROPOSER}}</text>

<!-- the hook -->
<rect x="64" y="556" width="1072" height="54" rx="14" fill="url(#cTeal)"/>
<text x="100" y="590" class="inter" font-size="21" font-weight="900" fill="#06231F">TAKE THE OTHER SIDE</text>
<path d="M392 583 h24 m-10 -8 l10 8 -10 8" fill="none" stroke="#06231F" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
<text x="1100" y="589" text-anchor="end" class="inter" font-size="17" font-weight="700" fill="#06231F">you'd back <tspan font-weight="900">{{COMPLEMENT}}</tspan> &#183; <tspan font-weight="900">{{STAKE}}</tspan></text>
</svg>
