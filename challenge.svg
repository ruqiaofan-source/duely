<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Duely challenge card: an open football bet daring you to take the other side">
<title>Duely open bet challenge card</title>
<desc>A broadcast scoreboard style open peer-to-peer football bet between two teams, showing the proposer's pick, the stake and a take-the-other-side call to action.</desc>
<defs>
<style>@import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Inter:wght@400;600;700;800;900&amp;display=swap');
.anton{font-family:'Anton','Oswald','Arial Narrow',Impact,sans-serif;}
.inter{font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;}</style>
<linearGradient id="cBg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#0E141C"/>
<stop offset="1" stop-color="#0B0F14"/>
</linearGradient>
<linearGradient id="cTeal" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#14E0C8"/>
<stop offset="1" stop-color="#0FB7A4"/>
</linearGradient>
<linearGradient id="cDuel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#14E0C8"/><stop offset=".5" stop-color="#14E0C8"/><stop offset=".5" stop-color="#7C3AED"/><stop offset="1" stop-color="#7C3AED"/></linearGradient>
</defs>

<rect width="1200" height="630" fill="#0B0F14"/>
<rect width="1200" height="630" fill="url(#cBg)"/>
<rect x="0" y="0" width="1200" height="8" fill="#FF4757"/>

<g opacity="0.05" stroke="#9AA7B8" stroke-width="2" fill="none">
<line x1="600" y1="120" x2="600" y2="470"/>
<circle cx="600" cy="295" r="78"/>
<rect x="40" y="120" width="118" height="350"/>
<rect x="1042" y="120" width="118" height="350"/>
</g>

<g class="inter">
<g transform="translate(56,40) scale(0.46)"><rect width="100" height="100" rx="26" fill="#0E141C"/><path d="M26 20 H56 C73 20 80 33 80 50 C80 67 73 80 56 80 H26 Z M39 33 H55 C64 33 68 41 68 50 C68 59 64 67 55 67 H39 Z" fill-rule="evenodd" fill="url(#cDuel)"/><rect x="51" y="20" width="3" height="60" fill="#0A0E13"/></g>
<text x="116" y="66" class="anton" font-size="34" fill="#F5F7FA" letter-spacing="1">DUELY</text>
<text x="118" y="84" class="inter" font-size="12.5" font-weight="700" fill="#14E0C8" letter-spacing="2">BACK YOURSELF.</text>
</g>

<g class="inter">
<rect x="1006" y="44" width="138" height="40" rx="20" fill="#241319" stroke="#FF4757" stroke-width="1.5"/>
<circle cx="1032" cy="64" r="5" fill="#FF4757"/>
<text x="1126" y="69" font-size="15" font-weight="800" fill="#FF4757" letter-spacing="1.5" text-anchor="end">OPEN BET</text>
</g>

<rect x="56" y="112" width="1088" height="38" rx="8" fill="#161C26" stroke="#2A3340" stroke-width="1"/>
<rect x="56" y="112" width="8" height="38" rx="4" fill="#7C3AED"/>
<g class="inter" font-weight="800" letter-spacing="1.5">
<text x="84" y="137" font-size="15" fill="#F5F7FA">{{COMP}}</text>
<text x="600" y="137" font-size="14" fill="#9AA7B8" text-anchor="middle" letter-spacing="3">MATCHDAY</text>
<text x="1116" y="137" font-size="15" fill="#F5F7FA" text-anchor="end">{{DATE}}</text>
</g>

<text x="600" y="206" class="inter" text-anchor="middle" font-size="17" font-weight="800" fill="#9AA7B8" letter-spacing="3">{{PROPOSER}} BACKS</text>

<text x="600" y="300" class="anton" text-anchor="middle" font-size="96" fill="#14E0C8" letter-spacing="0.5">{{BACKED}}</text>

<g class="inter">
<rect x="306" y="330" width="588" height="46" rx="23" fill="#161C26" stroke="#2A3340" stroke-width="1.5"/>
<circle cx="342" cy="353" r="18" fill="#0E141C" stroke="#14E0C8" stroke-width="2"/>
<text x="342" y="358" text-anchor="middle" font-size="12" font-weight="900" fill="#14E0C8">{{HOME_ABBR}}</text>
<text x="600" y="359" text-anchor="middle" font-size="18" fill="#F5F7FA"><tspan font-weight="800">{{HOME}}</tspan><tspan fill="#7C3AED" font-weight="900" dx="10">v</tspan><tspan font-weight="800" dx="10">{{AWAY}}</tspan></text>
<circle cx="858" cy="353" r="18" fill="#0E141C" stroke="#9AA7B8" stroke-width="2"/>
<text x="858" y="358" text-anchor="middle" font-size="12" font-weight="900" fill="#F5F7FA">{{AWAY_ABBR}}</text>
</g>

<rect x="56" y="402" width="1088" height="1.5" fill="#2A3340"/>

<g class="inter">
<rect x="56" y="422" width="340" height="120" rx="16" fill="#161C26" stroke="#2A3340" stroke-width="1.5"/>
<text x="82" y="456" font-size="13" font-weight="800" fill="#9AA7B8" letter-spacing="2">THE STAKE</text>
<text x="82" y="514" class="anton" font-size="60" fill="#2ED573">{{STAKE}}</text>
<text x="380" y="514" font-size="13" font-weight="600" fill="#9AA7B8" text-anchor="end">bragging</text>
<text x="380" y="532" font-size="13" font-weight="600" fill="#9AA7B8" text-anchor="end">rights</text>
</g>

<g class="inter">
<rect x="412" y="422" width="732" height="120" rx="16" fill="#161C26" stroke="#7C3AED" stroke-width="1.5"/>
<rect x="412" y="422" width="8" height="120" rx="4" fill="#7C3AED"/>
<text x="442" y="456" font-size="13" font-weight="800" fill="#B79BF5" letter-spacing="2">TRASH TALK</text>
<text x="442" y="496" class="inter" font-size="22" font-weight="700" fill="#F5F7FA">&#8220;{{NOTE}}&#8221;</text>
<text x="442" y="524" font-size="14" font-weight="600" fill="#9AA7B8">&#8212; {{PROPOSER}}</text>
</g>

<rect x="56" y="562" width="1088" height="48" rx="12" fill="url(#cTeal)"/>
<text x="442" y="592" class="inter" font-size="20" font-weight="900" fill="#06231F" text-anchor="end">Take the other side</text>
<path d="M462 586 h26 m-11 -8 l11 8 -11 8" fill="none" stroke="#06231F" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
<text x="520" y="591" class="inter" font-size="15" font-weight="700" fill="#06231F">you'd be backing <tspan font-weight="900">{{COMPLEMENT}}</tspan> for <tspan font-weight="900">{{STAKE}}</tspan></text>
</svg>
