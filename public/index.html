<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0F14" />
  <title>Duely — back yourself.</title>
  <meta name="description" content="Settle football arguments with your mates — friendly predictions, running rivalries, and who-owes-who kept honest. No money, no bookie. Just bragging rights." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E" />
  <!-- show the intro once per session (i.e. when a friend opens the link) -->
  <script>try{if(sessionStorage.getItem('duely_introed')){document.documentElement.classList.add('no-intro');}else{sessionStorage.setItem('duely_introed','1');}}catch(e){}</script>
</head>
<body>
  <!-- ambient floodlit background -->
  <div class="amb amb-aurora" aria-hidden="true"></div>
  <div class="amb amb-spot" aria-hidden="true"></div>
  <div class="amb amb-grain" aria-hidden="true"></div>

  <!-- floodlights-on intro (first open) -->
  <div id="intro" class="intro" aria-hidden="true">
    <span class="intro-beam beam-l"></span>
    <span class="intro-beam beam-r"></span>
    <div class="intro-core">
      <div class="intro-logo"><svg class="ball" viewBox="0 0 100 100" aria-hidden="true"><defs><radialGradient id="bSph" cx="38%" cy="30%" r="75%"><stop offset="0" stop-color="#ffffff"/><stop offset=".55" stop-color="#eaf0f6"/><stop offset="1" stop-color="#b3bdcb"/></radialGradient></defs><g class="ball-spin"><circle cx="50" cy="50" r="37" fill="url(#bSph)"/><polygon points="50,38 61.4,46.3 57,59.8 43,59.8 38.6,46.3" fill="#0B0F14"/><g stroke="#0B0F14" stroke-width="2.4" stroke-linecap="round" fill="none"><line x1="50" y1="38" x2="50" y2="14"/><line x1="61.4" y1="46.3" x2="82" y2="38"/><line x1="57" y1="59.8" x2="70" y2="78"/><line x1="43" y1="59.8" x2="30" y2="78"/><line x1="38.6" y1="46.3" x2="18" y2="38"/></g></g><ellipse cx="36" cy="32" rx="15" ry="10" fill="#ffffff" opacity=".5" transform="rotate(-28 36 32)"/></svg></div>
      <div class="intro-word">DUELY</div>
      <div class="intro-rule"></div>
      <div class="intro-tag">back yourself.</div>
    </div>
  </div>

  <div class="wrap">
    <header class="brand">
      <a href="/">
        <span class="logo"><svg class="ball" viewBox="0 0 100 100" aria-hidden="true"><g class="ball-spin"><circle cx="50" cy="50" r="37" fill="#eef2f7"/><polygon points="50,38 61.4,46.3 57,59.8 43,59.8 38.6,46.3" fill="#0B0F14"/><g stroke="#0B0F14" stroke-width="2.6" stroke-linecap="round" fill="none"><line x1="50" y1="38" x2="50" y2="14"/><line x1="61.4" y1="46.3" x2="82" y2="38"/><line x1="57" y1="59.8" x2="70" y2="78"/><line x1="43" y1="59.8" x2="30" y2="78"/><line x1="38.6" y1="46.3" x2="18" y2="38"/></g></g></svg></span>
        <div>
          <h1>Duely</h1>
          <div class="tag">back yourself.</div>
        </div>
      </a>
      <div id="headExtra"></div>
    </header>

    <main id="app">
      <div class="spin">Loading…</div>
    </main>

    <div class="foot">
      Duely keeps score — no money, no bookie. Mates sort the payment between themselves.<br />
      Bragging rights, not income. 18+.
    </div>
  </div>

  <nav id="tabbar" class="tabbar" aria-label="Primary">
    <button class="tab" data-tab="home"><span class="ti">⚽</span><span>Home</span></button>
    <button class="tab" data-tab="duels"><span class="ti">⚔️</span><span>Duels</span></button>
    <button class="tab" data-tab="league"><span class="ti">🏆</span><span>League</span></button>
    <button class="tab" data-tab="profile"><span class="ti">📊</span><span>You</span></button>
  </nav>

  <div class="sheet-scrim" id="sheetScrim" aria-hidden="true">
    <div class="sheet" id="sheetPanel" role="dialog" aria-modal="true"></div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/app.js"></script>
</body>
</html>
