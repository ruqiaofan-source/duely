<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Duely result card: a resolved football bet brag showing the winner, the payout and the head-to-head record">
<title>Duely resolved bet result card</title>
<desc>A broadcast scoreboard style full-time football bet result, showing the winner, the outcome, the payout owed and the running head-to-head rivalry.</desc>
<defs>
<style>@import url('https://fonts.googleapis.com/css2?family=Anton&amp;family=Inter:wght@400;600;700;800;900&amp;display=swap');
.anton{font-family:'Anton','Oswald','Arial Narrow',Impact,sans-serif;}
.inter{font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;}</style>
<linearGradient id="rBg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#0E141C"/>
<stop offset="1" stop-color="#0B0F14"/>
</linearGradient>
<linearGradient id="rTeal" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#14E0C8"/>
<stop offset="1" stop-color="#0FB7A4"/>
</linearGradient>
<linearGradient id="rDuel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#14E0C8"/><stop offset=".5" stop-color="#14E0C8"/><stop offset=".5" stop-color="#7C3AED"/><stop offset="1" stop-color="#7C3AED"/></linearGradient>
<linearGradient id="rGold" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#FFE08A"/>
<stop offset="1" stop-color="#FFC83D"/>
</linearGradient>
<radialGradient id="goldGlow" cx="0.5" cy="0.45" r="0.65">
<stop offset="0" stop-color="#FFC83D" stop-opacity="0.16"/>
<stop offset="1" stop-color="#FFC83D" stop-opacity="0"/>
</radialGradient>
</defs>

<rect width="1200" height="630" fill="#0B0F14"/>
<rect width="1200" height="630" fill="url(#rBg)"/>
<ellipse cx="430" cy="300" rx="460" ry="320" fill="url(#goldGlow)"/>
<rect x="0" y="0" width="1200" height="8" fill="#FFC83D"/>

<g opacity="0.05" stroke="#9AA7B8" stroke-width="2" fill="none">
<line x1="600" y1="120" x2="600" y2="470"/>
<circle cx="600" cy="295" r="78"/>
<rect x="40" y="120" width="118" height="350"/>
<rect x="1042" y="120" width="118" height="350"/>
</g>

<g class="inter">
<g transform="translate(56,40) scale(0.46)"><rect width="100" height="100" rx="26" fill="#0E141C"/><path d="M26 20 H56 C73 20 80 33 80 50 C80 67 73 80 56 80 H26 Z M39 33 H55 C64 33 68 41 68 50 C68 59 64 67 55 67 H39 Z" fill-rule="evenodd" fill="url(#rDuel)"/><rect x="51" y="20" width="3" height="60" fill="#0A0E13"/></g>
<text x="116" y="66" class="anton" font-size="34" fill="#F5F7FA" letter-spacing="1">DUELY</text>
<text x="118" y="84" class="inter" font-size="12.5" font-weight="700" fill="#14E0C8" letter-spacing="2">BACK YOURSELF.</text>
</g>

<g class="inter">
<rect x="1010" y="44" width="134" height="40" rx="20" fill="#1E1705" stroke="#FFC83D" stroke-width="1.5"/>
<path d="M1031 64 l6 6 11 -13" fill="none" stroke="#2ED573" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<text x="1126" y="69" font-size="15" font-weight="800" fill="#FFC83D" letter-spacing="1.5" text-anchor="end">SETTLED</text>
</g>

<rect x="56" y="112" width="1088" height="38" rx="8" fill="#161C26" stroke="#2A3340" stroke-width="1"/>
<rect x="56" y="112" width="8" height="38" rx="4" fill="#FFC83D"/>
<g class="inter" font-weight="800" letter-spacing="1.5">
<text x="84" y="137" font-size="15" fill="#F5F7FA">FULL TIME</text>
<text x="600" y="137" font-size="14" fill="#9AA7B8" text-anchor="middle" letter-spacing="2"><tspan font-weight="800" fill="#F5F7FA">{{HOME}}</tspan><tspan dx="6" fill="#5A6678">v</tspan><tspan dx="6" font-weight="800" fill="#F5F7FA">{{AWAY}}</tspan></text>
<text x="1116" y="137" font-size="15" fill="#2ED573" text-anchor="end">{{RESULT}}</text>
</g>

<g transform="translate(176,232)">
<path d="M-30 -28 h60 v10 q0 24 -22 30 q-8 12 -8 12 h0 q0 0 -8 -12 q-22 -6 -22 -30 z" fill="url(#rGold)"/>
<path d="M-30 -24 q-16 0 -16 16 q0 16 20 18" fill="none" stroke="#FFC83D" stroke-width="3.5"/>
<path d="M30 -24 q16 0 16 16 q0 16 -20 18" fill="none" stroke="#FFC83D" stroke-width="3.5"/>
<rect x="-10" y="24" width="20" height="14" fill="#E0A21F"/>
<rect x="-22" y="38" width="44" height="11" rx="3" fill="url(#rGold)"/>
</g>

<text x="240" y="208" class="inter" font-size="17" font-weight="800" fill="#FFC83D" letter-spacing="3">CALLED IT.</text>
<text x="240" y="300" class="anton" font-size="86" fill="#FFC83D">{{WINNER}}</text>
<text x="242" y="338" class="inter" font-size="20" font-weight="800" fill="#9AA7B8">{{RESULT}} &#183; {{LOSER}} owes the bragging rights</text>

<rect x="56" y="402" width="1088" height="1.5" fill="#2A3340"/>

<g class="inter">
<rect x="56" y="422" width="340" height="120" rx="16" fill="#161C26" stroke="#2ED573" stroke-width="1.5"/>
<rect x="56" y="422" width="8" height="120" rx="4" fill="#2ED573"/>
<text x="86" y="456" font-size="13" font-weight="800" fill="#2ED573" letter-spacing="2">THE DAMAGE</text>
<text x="86" y="514" class="anton" font-size="58" fill="#2ED573">{{STAKE}}</text>
<text x="86" y="532" font-size="13" font-weight="700" fill="#9AA7B8" letter-spacing="0.5">{{OWES}}</text>
</g>

<g class="inter">
<rect x="412" y="422" width="732" height="120" rx="16" fill="#161C26" stroke="#7C3AED" stroke-width="1.5"/>
<rect x="412" y="422" width="8" height="120" rx="4" fill="#7C3AED"/>
<text x="442" y="456" font-size="13" font-weight="800" fill="#B79BF5" letter-spacing="2">HEAD TO HEAD</text>
<text x="442" y="498" class="anton" font-size="40" fill="#F5F7FA">{{RIVALRY}}</text>
<text x="442" y="526" font-size="14" font-weight="600" fill="#9AA7B8">the rivalry continues &#183; rematch on Duely</text>
</g>

<rect x="56" y="562" width="1088" height="48" rx="12" fill="url(#rGold)"/>
<text x="600" y="592" class="inter" font-size="19" font-weight="900" fill="#3A2A00" text-anchor="middle">{{OWES}} &#160;&#183;&#160; told you so. &#8594;</text>
</svg>
